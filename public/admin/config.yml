backend:
  name: github
  repo: lincoln-cmd/Rangistein
  branch: main
  base_url: https://rangistein-decap-auth.dhkim1551.workers.dev
  auth_endpoint: /auth

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "/"
display_url: "/"

locale: "ko"

collections:
  - name: "posts"
    label: "게시물"
    label_singular: "게시물"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "posts/{{slug}}"
    fields:
      - {
          label: "제목",
          name: "title",
          widget: "string",
          hint: "짧고 명확하게 입력합니다.",
        }
      - {
          label: "설명",
          name: "description",
          widget: "text",
          hint: "게시물 요약을 1~2문장으로 입력합니다.",
        }

      - label: "카테고리"
        name: "categorySlug"
        widget: "select"
        hint: "카테고리는 slug 하나만 저장하고, 화면 표시는 사이트 설정에서 가져옵니다."
        options:
          - { label: "수학", value: "math" }
          - { label: "물리", value: "physics" }
          - { label: "화학", value: "chemistry" }
          - { label: "생명과학", value: "biology" }
          - { label: "지구과학", value: "earth-science" }
          - { label: "천문학", value: "astronomy" }
          - { label: "개인 공부 노트", value: "study-notes" }

      - label: "태그"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "너무 세분화하지 말고, 같은 의미 태그는 통일해서 사용합니다."

      - label: "게시물 유형"
        name: "type"
        widget: "select"
        options:
          - { label: "최신 연구/논문", value: "latest" }
          - { label: "개인 공부 노트", value: "study" }

      - {
          label: "발행일",
          name: "publishedAt",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
        }

      - {
          label: "수정일",
          name: "updatedAt",
          widget: "datetime",
          required: false,
          format: "YYYY-MM-DD",
          time_format: false,
        }

      - {
          label: "초안",
          name: "draft",
          widget: "boolean",
          default: false,
          required: false,
        }

      - {
          label: "대표 글",
          name: "featured",
          widget: "boolean",
          default: false,
          required: false,
        }

      - label: "참고 자료"
        name: "references"
        widget: "list"
        required: false
        summary: "{{fields.title}}"
        fields:
          - { label: "자료명", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

      - label: "시각화 블록"
        name: "visualizations"
        widget: "list"
        required: false
        summary: "{{fields.type}} · {{fields.id}} · {{fields.title}}"
        hint: "본문에서는 {{viz:블록ID}} 형식으로 삽입합니다."
        fields:
          - {
              label: "블록 ID",
              name: "id",
              widget: "string",
              hint: "본문에서 {{viz:chart-1}}처럼 정확히 같은 ID를 써야 합니다.",
            }

          - label: "시각화 종류"
            name: "type"
            widget: "select"
            options:
              - { label: "표", value: "table" }
              - { label: "막대 차트", value: "bar" }
              - { label: "선 차트", value: "line" }

          - { label: "제목", name: "title", widget: "string", required: false }
          - { label: "캡션", name: "caption", widget: "text", required: false }

          - {
              label: "표 헤더",
              name: "headersText",
              widget: "string",
              required: false,
              hint: "쉼표로 구분해서 입력합니다. 예: 항목, 값",
            }

          - label: "표 행"
            name: "rowsText"
            widget: "list"
            required: false
            summary: "{{fields.row}}"
            fields:
              - {
                  label: "행 값",
                  name: "row",
                  widget: "string",
                  hint: "한 줄이 표의 한 행입니다. 예: 질량, 3.2",
                }

          - {
              label: "차트 라벨",
              name: "labelsText",
              widget: "string",
              required: false,
              hint: "쉼표로 구분해서 입력합니다. 예: 1일차, 2일차, 3일차",
            }

          - label: "차트 데이터셋"
            name: "datasetsText"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: "데이터셋 이름", name: "label", widget: "string" }
              - {
                  label: "값 목록",
                  name: "dataText",
                  widget: "string",
                  hint: "숫자를 쉼표로 구분해서 입력합니다. 예: 10, 14, 18",
                }
              - {
                  label: "선 색상",
                  name: "borderColor",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "배경 색상",
                  name: "backgroundColor",
                  widget: "string",
                  required: false,
                }

          - {
              label: "X축 이름",
              name: "xLabel",
              widget: "string",
              required: false,
            }
          - {
              label: "Y축 이름",
              name: "yLabel",
              widget: "string",
              required: false,
            }
          - {
              label: "누적형",
              name: "stacked",
              widget: "boolean",
              required: false,
              default: false,
            }

      - label: "본문"
        name: "body"
        widget: "markdown"
        hint: |
          인라인 수식: $E = mc^2$
          블록 수식: $$ \int_0^1 x^2 \, dx = \frac{1}{3} $$
          화학식: $\ce{H2O}$
          반응식: $$\ce{2H2 + O2 -> 2H2O}$$
          시각화 삽입: {{viz:table-1}}
