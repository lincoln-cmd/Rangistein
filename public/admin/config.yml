backend:
  name: github
  repo: lincoln-cmd/Rangistein
  branch: main
  base_url: https://rangistein-decap-auth.dhkim1551.workers.dev
  auth_endpoint: /auth

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "/"
display_url: "/"

locale: "ko"

collections:
  - name: "posts"
    label: "게시물"
    label_singular: "게시물"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "posts/{{slug}}"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "설명", name: "description", widget: "text" }

      - label: "카테고리"
        name: "category"
        widget: "select"
        options:
          - "수학"
          - "물리"
          - "화학"
          - "생명과학"
          - "지구과학"
          - "천문학"
          - "개인 공부 노트"

      - label: "카테고리 슬러그"
        name: "categorySlug"
        widget: "select"
        options:
          - "math"
          - "physics"
          - "chemistry"
          - "biology"
          - "earth-science"
          - "astronomy"
          - "study-notes"

      - label: "태그"
        name: "tags"
        widget: "list"
        allow_add: true

      - label: "게시물 유형"
        name: "type"
        widget: "select"
        options:
          - { label: "최신 연구/논문", value: "latest" }
          - { label: "개인 공부 노트", value: "study" }

      - {
          label: "발행일",
          name: "publishedAt",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false,
        }

      - {
          label: "수정일",
          name: "updatedAt",
          widget: "datetime",
          required: false,
          format: "YYYY-MM-DD",
          time_format: false,
        }

      - {
          label: "초안",
          name: "draft",
          widget: "boolean",
          default: false,
          required: false,
        }

      - {
          label: "대표 글",
          name: "featured",
          widget: "boolean",
          default: false,
          required: false,
        }

      - label: "참고 자료"
        name: "references"
        widget: "list"
        required: false
        fields:
          - { label: "자료명", name: "title", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

      - label: "시각화 블록"
        name: "visualizations"
        widget: "list"
        required: false
        summary: "{{fields.type}} · {{fields.id}}"
        fields:
          - {
              label: "블록 ID",
              name: "id",
              widget: "string",
              hint: "본문에서 {{viz:chart-1}}처럼 정확히 같은 ID를 써야 합니다.",
            }

          - label: "시각화 종류"
            name: "type"
            widget: "select"
            options:
              - { label: "표", value: "table" }
              - { label: "막대 차트", value: "bar" }
              - { label: "선 차트", value: "line" }

          - { label: "제목", name: "title", widget: "string", required: false }
          - { label: "캡션", name: "caption", widget: "text", required: false }

          - {
              label: "표 헤더",
              name: "headersText",
              widget: "string",
              required: false,
              hint: "쉼표로 구분해서 입력합니다. 예: 항목, 값",
            }

          - label: "표 행"
            name: "rowsText"
            widget: "list"
            required: false
            summary: "{{fields.row}}"
            fields:
              - {
                  label: "행 값",
                  name: "row",
                  widget: "string",
                  hint: "한 줄이 표의 한 행입니다. 쉼표로 구분합니다. 예: 질량, 3.2",
                }

          - {
              label: "차트 라벨",
              name: "labelsText",
              widget: "string",
              required: false,
              hint: "쉼표로 구분해서 입력합니다. 예: 1일차, 2일차, 3일차",
            }

          - label: "차트 데이터셋"
            name: "datasetsText"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: "데이터셋 이름", name: "label", widget: "string" }
              - {
                  label: "값 목록",
                  name: "dataText",
                  widget: "string",
                  hint: "숫자를 쉼표로 구분해서 입력합니다. 예: 10, 14, 18",
                }
              - {
                  label: "선 색상",
                  name: "borderColor",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "배경 색상",
                  name: "backgroundColor",
                  widget: "string",
                  required: false,
                }

          - {
              label: "X축 이름",
              name: "xLabel",
              widget: "string",
              required: false,
            }
          - {
              label: "Y축 이름",
              name: "yLabel",
              widget: "string",
              required: false,
            }
          - {
              label: "누적형",
              name: "stacked",
              widget: "boolean",
              required: false,
              default: false,
            }

            - label: "본문"
              name: "body"
              widget: "markdown"
              hint: "인라인 수식은 $...$, 블록 수식은 $$...$$ 형태로 입력합니다."
